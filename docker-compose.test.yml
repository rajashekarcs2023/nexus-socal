version: "3.8"

services:
  test-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: test-agent
    restart: unless-stopped
    ports:
      - "8005:8005"
    env_file:
      - .env.test
    environment:
      - TEST_AGENT_PORT=8005
    networks:
      - agent-network

networks:
  agent-network:
    driver: bridge
